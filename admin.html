/* ===================================================================
   SMALL HELPERS
=================================================================== */
function escapeHtml(str){ return String(str||"").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ if(!iso) return "—"; return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtDateTimeInput(iso){
  if(!iso) return "";
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => el.classList.remove('show'), 2600);
}
function computeStatus(post){
  if (post.status === 'archived') return 'archived';
  if (post.status === 'draft') return 'draft';
  if (post.status === 'published' && new Date(post.publishDate) > new Date()) return 'scheduled';
  return post.status; // published
}
function statusBadge(post){
  const s = computeStatus(post);
  const label = s === 'scheduled' ? 'Scheduled' : s === 'draft' ? 'Draft' : s === 'archived' ? 'Archived' : 'Published';
  return `<span class="badge badge-${s}">${label}</span>`;
}

/* ===================================================================
   MODAL / CONFIRM
=================================================================== */
function openModal(html){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay open" id="modal-overlay"><div class="modal-box">${html}</div></div>`;
  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target.id === 'modal-overlay') closeModal(); });
}
function closeModal(){ document.getElementById('modal-root').innerHTML = ''; }
function confirmAction(message, onConfirm){
  openModal(`
    <h3>Are you sure?</h3>
    <p style="font-family:var(--sans);font-size:14px;color:var(--text-muted);">${message}</p>
    <div class="modal-actions">
      <button class="btn ghost" id="confirm-cancel">Cancel</button>
      <button class="btn danger" id="confirm-ok">Delete</button>
    </div>
  `);
  document.getElementById('confirm-cancel').addEventListener('click', closeModal);
  document.getElementById('confirm-ok').addEventListener('click', () => { onConfirm(); closeModal(); });
}

/* ===================================================================
   ROUTER
=================================================================== */
const routes = {};
function route(pattern, handler){ routes[pattern] = handler; }
function matchRoute(path){
  for (const pattern in routes){
    const parts = pattern.split('/').filter(Boolean);
    const pathParts = path.split('/').filter(Boolean);
    if (parts.length !== pathParts.length) continue;
    const params = {};
    let ok = true;
    for (let i=0;i<parts.length;i++){
      if (parts[i].startsWith(':')) params[parts[i].slice(1)] = decodeURIComponent(pathParts[i]);
      else if (parts[i] !== pathParts[i]) { ok = false; break; }
    }
    if (ok) return { handler: routes[pattern], params };
  }
  return null;
}
const PUBLIC_ROUTES = ['/login'];

function render(){
  const hash = location.hash.replace(/^#/, '') || '/dashboard';
  const app = document.getElementById('app');

  if (!CMS.isAuthed() && !PUBLIC_ROUTES.includes(hash)){
    location.hash = '/login';
    return;
  }
  if (CMS.isAuthed() && hash === '/login'){
    location.hash = '/dashboard';
    return;
  }

  if (hash === '/login'){
    app.innerHTML = viewLogin();
    wireLogin();
    return;
  }

  const match = matchRoute(hash);
  const body = match ? match.handler(match.params) : `<div class="admin-empty">Page not found. <a href="#/dashboard">Back to dashboard</a></div>`;
  app.innerHTML = adminShell(body, hash);
  wireShell();
  const routeKey = '/' + hash.split('/').filter(Boolean).slice(0,2).join('/');
  if (wireMap[routeKey]) wireMap[routeKey](match ? match.params : {});
}

}

   LOGIN VIEW
=================================================================== */
function viewLogin(){
  return `
  <div class="login-screen">
    <div class="login-card">
      <div class="brand-mark">If No One Reads This</div>
      <p class="lede-sm">Admin dashboard — sign in to manage your writing.</p>
      <div class="login-error" id="login-error">Incorrect password. Try again.</div>
      <div class="field-group">
        <label class="field-label" for="login-pass">Password</label>
        <input class="field-input" type="password" id="login-pass" placeholder="Enter admin password" autofocus>
      </div>
      <button class="btn" style="width:100%;justify-content:center;" id="login-btn">Sign in</button>
    </div>
  </div>`;
}
function wireLogin(){
  const btn = document.getElementById('login-btn');
  const input = document.getElementById('login-pass');
  function tryLogin(){
    if (CMS.login(input.value)){
      CMS.markKnownDevice();
      location.hash = '/dashboard';
    } else {
      document.getElementById('login-error').classList.add('show');
    }
  }
  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
}

/* ===================================================================
   DASHBOARD VIEW
=================================================================== */
function viewDashboard(){
  const posts = CMS.getAllPosts();
  const published = posts.filter(p => computeStatus(p) === 'published');
  const drafts = posts.filter(p => computeStatus(p) === 'draft');
  const scheduled = posts.filter(p => computeStatus(p) === 'scheduled');
  const archived = posts.filter(p => computeStatus(p) === 'archived');
  const cats = CMS.getCategories();
  const tags = CMS.getTags();
  const recent = [...posts].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt)).slice(0,6);

  return `
  <div class="admin-topbar"><h1>Dashboard</h1><a class="btn" href="#/writings/new">+ New writing</a></div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-num">${posts.length}</div><div class="stat-label">Total writings</div></div>
    <div class="stat-card"><div class="stat-num">${published.length}</div><div class="stat-label">Published</div></div>
    <div class="stat-card"><div class="stat-num">${drafts.length}</div><div class="stat-label">Drafts</div></div>
    <div class="stat-card"><div class="stat-num">${scheduled.length}</div><div class="stat-label">Scheduled</div></div>
    <div class="stat-card"><div class="stat-num">${archived.length}</div><div class="stat-label">Archived</div></div>
  </div>
  <div class="admin-panel">
    <h3>Recent activity</h3>
    ${recent.length ? recent.map(p => `
      <div class="activity-row">
        <span><a href="#/writings/edit/${p.id}" style="text-decoration:none;color:inherit;">${p.title}</a> ${statusBadge(p)}</span>
        <span>updated ${fmtDate(p.updatedAt)}</span>
      </div>`).join('') : `<div class="admin-empty">No activity yet.</div>`}
  </div>
  <div class="admin-panel">
    <h3>At a glance</h3>
    <div class="activity-row"><span>Tags in use</span><span>${tags.length}</span></div>
    <div class="activity-row"><span>Featured writings</span><span>${posts.filter(p=>p.featured).length}</span></div>
    <div class="activity-row"><span>Media items uploaded</span><span>${CMS.getMedia().length}</span></div>
  </div>
  `;
}

/* ===================================================================
   WRITINGS LIST VIEW
=================================================================== */
let currentWritingsFilter = 'active'; // 'active' | 'archived'

function viewWritingsList(){
  const all = [...CMS.getAllPosts()].sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  const archivedCount = all.filter(p => computeStatus(p) === 'archived').length;
  const posts = all.filter(p => currentWritingsFilter === 'archived'
    ? computeStatus(p) === 'archived'
    : computeStatus(p) !== 'archived');

  return `
  <div class="admin-topbar"><h1>Writings</h1><a class="btn" href="#/writings/new">+ New writing</a></div>

  <div class="seg-tabs" id="writings-view-tabs">
    <button data-view="active" class="${currentWritingsFilter==='active'?'active':''}">All writings</button>
    <button data-view="archived" class="${currentWritingsFilter==='archived'?'active':''}">Archived (${archivedCount})</button>
  </div>

  <div class="admin-panel" style="padding:0;">
    <div class="table-wrap">
    <table class="admin-table">
      <thead><tr><th>Title</th><th>Category</th><th>Status</th><th>Published</th><th>Updated</th><th>Views</th><th></th></tr></thead>
      <tbody id="writings-tbody">
        ${posts.length ? posts.map(p => `
        <tr data-id="${p.id}">
          <td class="title-cell">${p.title}${p.featured ? ' ★' : ''}<span class="sub">/${p.slug}</span></td>
          <td>${(CMS.getCategory(p.category)||{}).name || '—'}</td>
          <td>${statusBadge(p)}</td>
          <td>${fmtDate(p.publishDate)}</td>
          <td>${fmtDate(p.updatedAt)}</td>
          <td>${CMS.getViewsForPost(p.slug).toLocaleString()}</td>
          <td>
            <div class="row-actions">
              ${currentWritingsFilter === 'archived' ? `
                <button class="btn-icon" data-restore="${p.id}" title="Restore"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 9 9 9"/></svg></button>
                <button class="btn-icon" data-del="${p.id}" title="Delete permanently"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              ` : `
                <a class="btn-icon" href="#/writings/edit/${p.id}" title="Edit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></a>
                <button class="btn-icon" data-dup="${p.id}" title="Duplicate"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
                <button class="btn-icon" data-archive="${p.id}" title="Archive"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></button>
                <button class="btn-icon" data-del="${p.id}" title="Delete"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
              `}
            </div>
          </td>
        </tr>`).join('') : `<tr><td colspan="7"><div class="admin-empty">${currentWritingsFilter === 'archived' ? 'No archived writings. Anything you archive will show up here.' : `No writings yet. <a href="#/writings/new">Create your first one</a>.`}</div></td></tr>`}
      </tbody>
    </table>
    </div>
  </div>
  `;
}
function wireWritingsList(){
  const tabs = document.getElementById('writings-view-tabs');
  if (tabs){
    tabs.addEventListener('click', e => {
      const btn = e.target.closest('button[data-view]');
      if (!btn) return;
      currentWritingsFilter = btn.dataset.view;
      render();
    });
  }

  const tbody = document.getElementById('writings-tbody');
  if (!tbody) return;
  tbody.addEventListener('click', e => {
    const dup = e.target.closest('[data-dup]');
    const del = e.target.closest('[data-del]');
    const archiveBtn = e.target.closest('[data-archive]');
    const restoreBtn = e.target.closest('[data-restore]');

    if (dup){ CMS.duplicatePost(dup.dataset.dup); toast('Writing duplicated as a draft.'); render(); }

    if (del){
      confirmAction('This will permanently delete this writing.', () => {
        CMS.deletePost(del.dataset.del);
        toast('Writing deleted.');
        render();
      });
    }

    if (archiveBtn){
      const post = CMS.getPostById(archiveBtn.dataset.archive);
      if (post){
        CMS.savePost(Object.assign({}, post, { previousStatus: post.status, status: 'archived' }));
        toast('Writing archived. You can restore it anytime.');
        render();
      }
    }

    if (restoreBtn){
      const post = CMS.getPostById(restoreBtn.dataset.restore);
      if (post){
        CMS.savePost(Object.assign({}, post, { status: post.previousStatus || 'draft' }));
        toast('Writing restored.');
        render();
      }
    }
  });
}

function wireEditor(surfaceId, toolbarEl){
  const surface = document.getElementById(surfaceId);
  toolbarEl.querySelectorAll('button[data-cmd]').forEach(btn => {
    btn.addEventListener('mousedown', e => e.preventDefault()); // keep focus/selection in editor
    btn.addEventListener('click', () => {
      surface.focus();
      const cmd = btn.dataset.cmd;
      if (cmd === 'createLink'){
        const url = prompt('Link URL:', 'https://');
        if (url) document.execCommand('createLink', false, url);
        return;
      }
      if (cmd === 'insertImage'){
        openImagePicker(dataUrl => {
          surface.focus();
          document.execCommand('insertImage', false, dataUrl);
        });
        return;
      }
      document.execCommand(cmd, false, btn.dataset.arg || undefined);
    });
  });
}

/* ===================================================================
   IMAGE PICKER MODAL (used by editor + cover image field)

    <div class="modal-actions"><button class="btn ghost" id="picker-cancel">Cancel</button></div>

  });

function wireWritingEditor(params){
  const contentSurface = document.getElementById('f-content');
  if (!contentSurface) return;

  const archiveToggleBtn = document.getElementById('archive-toggle-btn');
  if (archiveToggleBtn){
    archiveToggleBtn.addEventListener('click', () => {
      const existing = CMS.getPostById(params.id);
      if (!existing) return;
      if (computeStatus(existing) === 'archived'){
        CMS.savePost(Object.assign({}, existing, { status: existing.previousStatus || 'draft' }));
        toast('Writing restored.');
      } else {
        CMS.savePost(Object.assign({}, existing, { previousStatus: existing.status, status: 'archived' }));
        toast('Writing archived. You can restore it anytime.');
      }
      location.hash = '/writings';
    });
  }

  // Archived writings are read-only in the editor — skip wiring the editing controls.
  if (contentSurface.getAttribute('contenteditable') === 'false') return;

  wireEditor('f-content', document.querySelector('.editor-toolbar'));

  document.querySelectorAll('#tag-picker .tag-pick').forEach(btn => {
    btn.addEventListener('click', () => btn.classList.toggle('selected'));
  });

  document.getElementById('choose-cover-btn').addEventListener('click', () => {
    openImagePicker(dataUrl => {
      document.getElementById('f-cover').value = dataUrl;
      const wrap = document.querySelector('.cover-picker');
      const existing = document.getElementById('cover-preview') || document.getElementById('cover-preview-empty');
      const img = document.createElement('img');
      img.className = 'cover-preview'; img.id = 'cover-preview'; img.src = dataUrl;
      existing.replaceWith(img);
    });
  });

  function collect(status){
    const selectedTags = Array.from(document.querySelectorAll('#tag-picker .tag-pick.selected')).map(b => b.dataset.tag);
    const isEdit = !!params.id;
    const existing = isEdit ? CMS.getPostById(params.id) : null;
    return {
      id: params.id || undefined,
      title: document.getElementById('f-title').value.trim() || 'Untitled',
      subtitle: document.getElementById('f-subtitle').value.trim(),
      content: document.getElementById('f-content').innerHTML,
      slug: document.getElementById('f-slug').value.trim(),
      seoTitle: document.getElementById('f-seo-title').value.trim(),
      metaDescription: document.getElementById('f-meta-desc').value.trim(),
      coverImage: document.getElementById('f-cover').value,
      category: document.getElementById('f-category').value,
      tags: selectedTags,
      publishDate: document.getElementById('f-pubdate').value ? new Date(document.getElementById('f-pubdate').value).toISOString() : new Date().toISOString(),
      featured: document.getElementById('f-featured').checked,
      status: status,
      createdAt: existing ? existing.createdAt : undefined,
    };
  }

  const saveDraftBtn = document.getElementById('save-draft-btn');
  if (saveDraftBtn){
    saveDraftBtn.addEventListener('click', () => {
      const record = CMS.savePost(collect('draft'));
      toast('Draft saved.');
      location.hash = '/writings/edit/' + record.id;
      render();
    });
  }
  const publishBtn = document.getElementById('publish-btn');
  if (publishBtn){
    publishBtn.addEventListener('click', () => {
      const data = collect('published');
      const future = new Date(data.publishDate) > new Date();
      const record = CMS.savePost(data);
      toast(future ? 'Writing scheduled.' : 'Writing published.');
      location.hash = '/writings/edit/' + record.id;
      render();
    });
  }
}

function timeAgo(iso){
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

      CMS.clearViews();
      toast('View history cleared.');
      render();
    });
  });
}

    <h3>About page photo</h3>
    <p class="field-hint" style="margin-bottom:16px;">Shown at the top of your public About page. Leave empty to use the default monogram instead.</p>
    <div class="cover-picker" style="max-width:260px;">
      ${settings.aboutPhoto
        ? `<img class="cover-preview" id="about-photo-preview" src="${settings.aboutPhoto}" style="border-radius:50%;height:220px;">`
        : `<div class="cover-preview-empty" id="about-photo-preview-empty" style="border-radius:50%;height:220px;">No photo set</div>`}
      <input type="hidden" id="f-about-photo" value="${settings.aboutPhoto || ''}">
      <div style="display:flex;gap:8px;">
        <button type="button" class="btn ghost small" id="choose-about-photo-btn" style="flex:1;justify-content:center;">Choose photo</button>
        ${settings.aboutPhoto ? `<button type="button" class="btn ghost small" id="remove-about-photo-btn" style="flex:1;justify-content:center;">Remove</button>` : ''}
      </div>
    </div>
  </div>
  `;
}
function wireSettingsAdmin(){
  const chooseBtn = document.getElementById('choose-about-photo-btn');
  if (!chooseBtn) return;
  chooseBtn.addEventListener('click', () => {
    openImagePicker(dataUrl => {
      CMS.saveSettings({ aboutPhoto: dataUrl });
      toast('About photo updated.');
      render();
    });
  });
  const removeBtn = document.getElementById('remove-about-photo-btn');
  if (removeBtn){
    removeBtn.addEventListener('click', () => {
      CMS.saveSettings({ aboutPhoto: '' });
      toast('About photo removed.');
      render();
    });
  }
}

/* ===================================================================
   INTERACTIVITY: magnetic buttons + click ripple (dashboard buttons only —
   no custom cursor here, it would fight with the rich text editor's caret)
=================================================================== */
(function initAdminInteractivity(){
  const fine = window.matchMedia('(pointer: fine)').matches;
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (fine && !reduced){
    function bindMagnetic(){
      document.querySelectorAll('.btn, .icon-btn').forEach(btn => {
        if (btn.dataset.magnetic) return;
        btn.dataset.magnetic = '1';
        btn.addEventListener('mousemove', e => {
          const r = btn.getBoundingClientRect();
          const x = e.clientX - r.left - r.width / 2;
          const y = e.clientY - r.top - r.height / 2;
          btn.style.transform = `translate(${x * 0.18}px, ${y * 0.18}px)`;
        });
        btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
      });
    }
    bindMagnetic();
    const observer = new MutationObserver(() => bindMagnetic());
    observer.observe(document.getElementById('app'), { childList: true, subtree: true });
  }
  document.addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const r = btn.getBoundingClientRect();
    const size = Math.max(r.width, r.height);
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - r.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - r.top - size / 2) + 'px';
    btn.appendChild(ripple);
    setTimeout(() => ripple.remove(), 650);
  });
})();

window.addEventListener('hashchange', render);
window.addEventListener('load', render);
render();
</script>
